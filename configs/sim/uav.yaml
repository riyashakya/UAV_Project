# UAV kinematics + energy model (Phase 4). Illustrative small survey-multirotor figures;
# Phase 9 can sweep them. No magic numbers in src/ — every constant lives here with provenance.

cruise_speed_ms: 15.0         # ~54 km/h cruise, typical survey multirotor
p_hover_w: 200.0              # hover power draw (W)
k_drag: 0.35                  # aero term in P = p_hover + k_drag * v^2, units W/(m/s)^2
battery_capacity_j: 300000.0  # 300 kJ usable energy (conservative multirotor pack)
rth_margin: 1.3               # return-to-home when remaining energy < 1.3 x energy needed to reach base
