# Unified detection taxonomy and per-source class mapping (ADR-002: two models, not one).
#
# This file is the single source of truth for how every source dataset's native classes
# map into the unified taxonomy. Totality is enforced by tests/test_taxonomy.py:
#   * every native class appears exactly once, under `map` OR `drop` (no silent drops);
#   * no class is both mapped and dropped;
#   * every `map` target is a valid unified class for that source's task.
#
# Native class lists are in on-disk index order (VisDrone YOLO ids; RescueNet/FloodNet mask
# palette indices) so loaders can translate index -> name directly. Sources verified against
# the dataset papers (see docs/datasets.md for citations).

# --- Unified classes -----------------------------------------------------------------------
unified:
  detect:            # Model A — YOLO detect
    - person
    - vehicle
  segment:           # Model B — YOLO-seg
    - building_damaged
    - road_blocked
    - water

# --- Per-source mappings -------------------------------------------------------------------
sources:
  visdrone:
    task: detect
    # RAW VisDrone-DET annotation format: category id is field 6 (index 5), ids 0..11.
    # `native` is in id order so the loader can index native[id] directly.
    # Zhu et al. 2021, TPAMI.
    native: [ignored-regions, pedestrian, people, bicycle, car, van, truck,
             tricycle, awning-tricycle, bus, motor, others]
    map:
      pedestrian: person
      people: person
      car: vehicle
      van: vehicle
      truck: vehicle
      bus: vehicle
    drop: [ignored-regions, bicycle, tricycle, awning-tricycle, motor, others]

  sard:
    task: detect
    # Sambolek & Ivasic-Kos 2021, IEEE Access. VOC XML. The Roboflow export collapses all
    # poses to a single `human` class; the original IEEE DataPort release sub-labels by pose.
    # We accept both so either download works; all map to person.
    native: [human, standing, walking, running, sitting, lying, not-defined]
    map:
      human: person
      standing: person
      walking: person
      running: person
      sitting: person
      lying: person
      not-defined: person
    drop: []
    keep_metadata: pose      # native label kept per detection (pose, or 'human' if flattened)

  rescuenet:
    task: segment
    # Chowdhury et al. 2023, Scientific Data 10. Mask palette indices 0..10.
    native: [background, water, building-no-damage, building-minor-damage,
             building-major-damage, building-total-destruction, vehicle,
             road-clear, road-blocked, tree, pool]
    map:
      water: water
      building-major-damage: building_damaged
      building-total-destruction: building_damaged
      road-blocked: road_blocked
    # RescueNet `vehicle` is a MASK; Model A wants boxes. Emitting vehicle boxes via
    # mask->bbox is deferred (PROJECT_PLAN 3.4) — dropped here, documented in docs/datasets.md.
    drop: [background, building-no-damage, building-minor-damage, vehicle,
           road-clear, tree, pool]

  floodnet:
    task: segment
    # Rahnemoonfar et al. 2021, IEEE Access. Mask palette indices 0..9.
    native: [background, building-flooded, building-non-flooded, road-flooded,
             road-non-flooded, water, tree, vehicle, pool, grass]
    map:
      building-flooded: building_damaged
      road-flooded: road_blocked
      water: water
    drop: [background, building-non-flooded, road-non-flooded, tree, vehicle, pool, grass]
