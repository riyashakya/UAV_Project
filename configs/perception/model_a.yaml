# Model A — detect (person, vehicle). Unified detect set (VisDrone + SARD).
# We run a YOLO11 SIZE comparison (n/s/m/l) with everything else held identical, so the only
# variable is model scale (a fair speed-vs-accuracy study). The Colab notebook mirrors these
# values; keep the two in sync. Every number has a provenance note (CLAUDE.md: no magic numbers).

task: detect
data: data/unified/detect/data.yaml

# The single "most suitable" model for local training (best speed/accuracy balance).
model: yolo11s.pt
sizes: [yolo11n, yolo11s, yolo11m, yolo11l]   # (deferred) size comparison; only the size changes
imgsz: 640                   # matches the SAHI inference slice size (640x640); the detector
                             # trains at the resolution it sees per-tile, and SAHI recovers the
                             # tiny objects at inference (Phase 2-3). Also keeps MPS tractable.
final_epochs: 60             # local single-model run; early-stopped by patience
compare_epochs: 50           # (deferred) size-comparison sweep length
patience: 15                 # stop if val mAP hasn't improved for 15 epochs
batch: 8                     # fixed batch: auto-batch (-1) is CUDA-only; 8 is a safe MPS batch (calibrated)
optimizer: auto
seed: 0                      # explicit seed for reproducibility (CLAUDE.md)

# NOTE: SAHI tiled inference is applied at EVAL / inference time (Phase 2-3), not training.
