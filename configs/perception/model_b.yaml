# Model B — segment (building_damaged, road_blocked, water). Unified seg set (RescueNet + FloodNet).
# YOLO11 SIZE comparison (n/s/m/l), everything else identical. The Colab notebook mirrors these.

task: segment
data: data/unified/seg/data.yaml

# The single "most suitable" model for local training (best speed/accuracy balance).
model: yolo11s-seg.pt
sizes: [yolo11n-seg, yolo11s-seg, yolo11m-seg, yolo11l-seg]   # (deferred) size comparison
imgsz: 640                   # local MPS-tractable; images are already downscaled to 1280 on disk
final_epochs: 60             # local single-model run; early-stopped by patience
compare_epochs: 50           # (deferred) size-comparison sweep length
patience: 15
batch: 8                     # segmentation is heavier than detect; 8 is a safe MPS batch at 640
optimizer: auto
seed: 0

# NOTE: road_blocked is the minority class (2,643 vs ~6,600) — watch for class imbalance.
